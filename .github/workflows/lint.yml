name: golangci-lint
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  golangci:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
          - ubuntu-latest
    name: lint
    runs-on: ${{ matrix.os }}
    steps:
      # actions/checkout v6
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      # actions/setup-go v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.25.x"
          cache: true
      - name: golangci-lint
        # golangci/golangci-lint-action v9
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee
        with:
          version: v2.12.2
